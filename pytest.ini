[pytest]
# Pytest configuration for the first walking slice.
#
# - `--hypothesis-seed=<n>` is exposed automatically by the Hypothesis pytest
#   plugin and is honored on every invocation. The seed is recorded in the
#   captured stdout per design §"Seed Capture (Requirement 15.13 / Property 13)".
# - Per-test Hypothesis profile selection is driven by the
#   `HYPOTHESIS_PROFILE` environment variable (read in tests/conftest.py)
#   or via the plugin's `--hypothesis-profile=<name>` CLI flag.
#
testpaths = tests
addopts = -ra --strict-markers --strict-config
asyncio_mode = auto

# Test-type markers used by the three test trees (unit, property, end_to_end).
markers =
    unit: example-based unit test
    property: property-based test using Hypothesis (see design §"Property Tests")
    end_to_end: HTTP end-to-end integration test (httpx.AsyncClient over FastAPI)

# Python path for `src/` layout; pytest will import `walking_slice` without
# requiring an editable install for collection.
pythonpath = src
