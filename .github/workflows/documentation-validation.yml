name: Documentation and delivery validation

on:
  pull_request:
    paths:
      - "README.md"
      - "documents/**"
      - "planning/**"
      - "traceability/**"
      - "scripts/validate_documentation.py"
      - "scripts/validate_all_documentation.py"
      - "scripts/validate_delivery_plan.py"
      - ".github/workflows/documentation-validation.yml"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "documents/**"
      - "planning/**"
      - "traceability/**"
      - "scripts/validate_documentation.py"
      - "scripts/validate_all_documentation.py"
      - "scripts/validate_delivery_plan.py"
      - ".github/workflows/documentation-validation.yml"

permissions:
  contents: read

jobs:
  validate-documentation-and-delivery:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate documentation inventory and traceability
        run: python scripts/validate_all_documentation.py

      - name: Validate phases, deliverables, dependencies, and risks
        run: python scripts/validate_delivery_plan.py
